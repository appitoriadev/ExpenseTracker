services:
  # PostgreSQL Database
  expenseTrackerPostgres:
    image: postgres:17-alpine
    container_name: expenseTrackerPostgres
    networks:
      - expenseTrackerNetwork
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: expense_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Data/Schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # BalastLane API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expenseTracker-api
    networks:
      - expenseTrackerNetwork
    environment:
      CONNECTIONSTRINGS_EXPENSETRACKER: "Host=testBalastLane;Port=5432;Database=expense_tracker;Username=postgres;Password=password"
      JWT_KEY: ${JWT_KEY:-your-256-bit-secret-key-at-least-32-characters-long-for-signing}
      JWT_ISSUER: ${JWT_ISSUER:-ExpenseTrackerApi}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ExpenseTrackerClient}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
    ports:
      - "5157:8080"
      - "5158:8443"
    depends_on:
      expenseTrackerPostgres:
        condition: service_healthy

networks:
  expenseTrackerNetwork:
    driver: bridge

volumes:
  postgres_data:
    driver: local
